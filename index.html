<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Griffin Wing Base Map</title>
    <link rel="stylesheet" href="./styles.css?v=26">
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar" aria-label="Map controls">
        <div>
          <p class="eyebrow">Dune: Awakening</p>
          <h1 id="pageTitle">Griffin Wing Base Map</h1>
        </div>
        <div class="status-group">
          <span id="deepResetStatus" class="badge reset-badge hidden">DD reset: --</span>
          <span id="adminBadge" class="badge hidden">Host admin</span>
          <span id="syncStatus" class="badge">HTML v3</span>
        </div>
      </section>

      <section class="map-panel">
        <div id="map" class="map" aria-label="Hagga Basin map">
          <div class="map-tabs" aria-label="Map selector">
            <button id="haggaTab" class="map-tab active" type="button" data-map-id="hagga">Hagga Basin</button>
            <button id="deepTab" class="map-tab" type="button" data-map-id="deep">Deep Desert</button>
          </div>
          <div id="tileLayer" class="tile-layer"></div>
          <div id="gridLayer" class="grid-layer hidden" aria-hidden="true"></div>
          <div id="spiceLayer" class="spice-layer hidden" aria-label="Deep Desert overlay locations"></div>
          <div id="markerLayer" class="marker-layer"></div>
          <div id="deepResourceLegend" class="resource-legend hidden" aria-label="Deep Desert resources">
            <div class="resource-legend-title">Resources</div>
            <div class="resource-items">
              <label class="resource-item">
                <span class="resource-icon spice"></span>
                <span>Large Spice Field</span>
                <input class="resource-toggle" type="checkbox" data-resource-type="spice" checked>
              </label>
              <label class="resource-item">
                <span class="resource-icon titanium"></span>
                <span>Titanium</span>
                <input class="resource-toggle" type="checkbox" data-resource-type="titanium" checked>
              </label>
              <label class="resource-item">
                <span class="resource-icon stravidium"></span>
                <span>Stravidium</span>
                <input class="resource-toggle" type="checkbox" data-resource-type="stravidium" checked>
              </label>
              <label class="resource-item">
                <span class="resource-icon testing-station"></span>
                <span>Testing Station</span>
                <input class="resource-toggle" type="checkbox" data-resource-type="testingStation" checked>
              </label>
              <label class="resource-item">
                <span class="resource-icon cave"></span>
                <span>Cave</span>
                <input class="resource-toggle" type="checkbox" data-resource-type="cave" checked>
              </label>
            </div>
          </div>
          <label class="zoom-control" aria-label="Map zoom">
            <span>Zoom</span>
            <input id="zoomSlider" type="range" min="1" max="4" step="1" value="2">
          </label>
        </div>

        <aside class="side-panel" aria-label="Base marker details">
          <label id="deepTypeField" class="field hidden">
            <span>Location type</span>
            <select id="deepMarkerType">
              <option value="base">My Base</option>
              <option value="enemy">Enemy Base</option>
            </select>
          </label>

          <label class="field">
            <span>Character Name</span>
            <input id="playerName" type="text" maxlength="40" autocomplete="nickname" placeholder="Example: LuckyBananas">
          </label>

          <label id="seitchField" class="field">
            <span>Seitch Name</span>
            <input id="seitchName" type="text" maxlength="40" autocomplete="organization" placeholder="Example: Seitch Ramal">
          </label>

          <label id="deepZoneField" class="checkbox-field hidden">
            <input id="deepPvpZone" type="checkbox">
            <span>PvP area</span>
          </label>

          <label id="deepGuildField" class="checkbox-field hidden">
            <input id="deepGuildBase" type="checkbox">
            <span>Guild Base</span>
          </label>

          <label id="markerTypeField" class="field hidden">
            <span>Marker image</span>
            <select id="markerType">
              <option value="own">My Base</option>
              <option value="other">Member Base</option>
              <option value="guild">Guild access base</option>
              <option value="enemy">Enemy</option>
            </select>
          </label>

          <div class="actions">
            <button id="placeButton" type="button">Place my base</button>
            <button id="cancelButton" class="secondary hidden" type="button">Cancel</button>
          </div>

          <p id="modeHint" class="hint">Pan and zoom the map. Choose Place my base, then click your base location.</p>
          <p id="baseLimitHint" class="hint"></p>
          <p id="userIdHint" class="hint hidden"></p>

          <div class="divider"></div>

          <div class="list-header">
            <h2>Bases</h2>
            <span id="baseCount">0</span>
          </div>
          <div id="baseList" class="base-list"></div>
        </aside>
      </section>
    </main>

    <dialog id="editDialog" class="edit-dialog">
      <form id="editForm" method="dialog">
        <h2>Edit Base</h2>
        <label class="field">
          <span>Character Name</span>
          <input id="editPlayerName" type="text" maxlength="40" required>
        </label>
        <label class="field">
          <span>Seitch Name</span>
          <input id="editSeitchName" type="text" maxlength="40">
        </label>
        <label id="editGuildField" class="checkbox-field hidden">
          <input id="editGuildAccess" type="checkbox">
          <span>Guild Access Base</span>
        </label>
        <div class="dialog-actions">
          <button id="editSaveButton" type="submit">Save</button>
          <button id="editCancelButton" class="secondary" type="button">Cancel</button>
        </div>
      </form>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js?v=4"></script>
    <script src="./app.js?v=26"></script>
  </body>
</html>
